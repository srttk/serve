public: public
cleanUrls: true
trailingSlash: false
rewrites:
  - source: /app/**
    destination: /index.html
redirects:
  - source: /old-page
    destination: /new-page
    type: 301
headers:
  - source: /**
    headers:
      - key: Cache-Control
        value: max-age=7200
directoryListing: true
etag: true
ignore:
  - .env
  - node_modules/**
stream:
  streamExtensions:
    - mp4
    - webm
    - ogg
    - mp3
    - wav
    - pdf
  enableRanges: true
auth:
  - source: /private/**
    username: admin
    password: secretpassword
  - source: /staging/**
    username: tester
    env_password: STAGING_PASSWORD
