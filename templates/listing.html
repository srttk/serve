<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index of {{ path }}</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --accents-1: #fafafa;
            --accents-2: #eaeaea;
            --accents-3: #999999;
            --link: #0070f3;
            --font-mono: 'Menlo', 'Monaco', 'Lucida Console', 'Liberation Mono', 'DejaVu Sans Mono', 'Bitstream Vera Sans Mono', 'Courier New', monospace;
        }

        [data-theme='dark'] {
            --bg: #000000;
            --fg: #ffffff;
            --accents-1: #111111;
            --accents-2: #333333;
            --accents-3: #888888;
            --link: #3291ff;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font-mono);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--accents-2);
            padding-bottom: 20px;
        }

        .breadcrumbs {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .breadcrumbs a {
            color: var(--fg);
            text-decoration: none;
        }

        .breadcrumbs a:hover {
            text-decoration: underline;
        }

        .breadcrumbs span {
            color: var(--accents-3);
            margin: 0 8px;
        }

        #theme-toggle {
            background: none;
            border: 1px solid var(--accents-2);
            color: var(--fg);
            cursor: pointer;
            padding: 6px 12px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            border-radius: 4px;
            transition: all 0.5s ease;
        }

        #theme-toggle:hover {
            background-color: var(--accents-1);
            border-color: var(--fg);
        }

        .entry-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .entry-item {
            display: flex;
            align-items: center;
            padding: 12px 8px;
            border-bottom: 1px solid var(--accents-1);
            transition: background 0.1s ease;
        }

        .entry-item:hover {
            background-color: var(--accents-1);
        }

        .entry-item a {
            flex-grow: 1;
            color: var(--link);
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .entry-item a:hover {
            text-decoration: underline;
        }

        .icon {
            margin-right: 12px;
            width: 16px;
            text-align: center;
            color: var(--fg);
        }

        .entry-meta {
            color: var(--accents-3);
            font-size: 0.8rem;
            text-align: right;
            min-width: 120px;
        }

        footer {
            margin-top: 60px;
            border-top: 1px solid var(--accents-2);
            padding-top: 20px;
            font-size: 0.8rem;
            color: var(--accents-3);
        }

        @media (max-width: 600px) {
            .entry-meta {
                display: none;
            }
        }
        

    
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="breadcrumbs">
                <a href="/">~</a>
                {% for part in breadcrumbs %}
                    <span>/</span><a href="{{ part.url }}">{{ part.name }}</a>
                {% endfor %}
            </div>
            <button id="theme-toggle">Toggle Theme</button>
        </header>

        <main>
            <ul class="entry-list">
                {% if path != "/" %}
                <li class="entry-item">
                    <span class="icon">↳</span>
                    <a href="..">..</a>
                </li>
                {% endif %}

                {% for entry in entries %}
                <li class="entry-item">
                    <span class="icon">
                        {% if entry.is_dir %}<div class="icon-directory">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
                        </div>{% else %}<div class="icon-file">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/></svg>
                        </div>{% endif %}
                    </span>
                    <a href="{{ entry.url }}">{{ entry.name }}</a>
                    <span class="entry-meta">
                        {% if !entry.is_dir %}{{ entry.size }}{% endif %}
                    </span>
                </li>
                {% endfor %}
            </ul>
        </main>

       

        <footer>
            srttk/serve
        </footer>
    </div>

    <script>
        const toggle = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

        if (currentTheme) {
            document.documentElement.setAttribute('data-theme', currentTheme);
        }

        toggle.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            let newTheme = theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>
</html>
